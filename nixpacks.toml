[variables]
NIXPACKS_PHP_VERSION = "8.2"

[phases.setup]
nixPkgs = [
    "php82",
    "php82Extensions.pdo",
    "php82Extensions.pdo_mysql",
    "php82Extensions.mbstring",
    "php82Extensions.tokenizer",
    "php82Extensions.xml",
    "php82Extensions.ctype",
    "php82Extensions.fileinfo",
    "php82Extensions.openssl",
    "php82Extensions.curl",
    "php82Extensions.gd",
    "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
    "chmod +x start.sh",
    "chmod -R 775 storage bootstrap/cache"
]

[start]
cmd = "bash start.sh"
